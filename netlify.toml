[build]
  # Copy static folder to the publish directory during build for global CDN delivery
  command = "mkdir -p public && cp -r static public/"
  publish = "public"

[functions]
  # Modern, explicit configuration to register Python serverless functions
  directory = "netlify/functions"

[[redirects]]
  # Netlify CDN will serve anything inside public/static/* directly.
  # All other dynamic routes will fall back here and be executed by your Flask app.
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
