{% extends 'admin/base.html' %}
{% block title %}Settings{% endblock %}
{% block page_title %}Store Settings{% endblock %}

{% block content %}
<form method="POST">
    <div class="settings-grid">
        <div class="card">
            <div class="card-header"><h3>💳 Payment Methods</h3></div>
            <div class="form-group">
                <label class="checkbox-label"><input type="checkbox" name="cod_enabled" {% if settings.get('cod_enabled','true') == 'true' %}checked{% endif %}> Enable Cash on Delivery (COD)</label>
            </div>
            <div class="form-group">
                <label class="checkbox-label"><input type="checkbox" name="razorpay_enabled" {% if settings.get('razorpay_enabled') == 'true' %}checked{% endif %} onchange="document.getElementById('rzpFields').style.display=this.checked?'block':'none'"> Enable Razorpay (Online Payment)</label>
            </div>
            <div id="rzpFields" style="{% if settings.get('razorpay_enabled') != 'true' %}display:none{% endif %}">
                <div class="form-group"><label>Razorpay Key ID</label><input type="text" name="razorpay_key_id" value="{{ settings.get('razorpay_key_id', '') }}"></div>
                <div class="form-group"><label>Razorpay Key Secret</label><input type="password" name="razorpay_key_secret" value="{{ settings.get('razorpay_key_secret', '') }}"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h3>🚚 Shipping</h3></div>
            <div class="form-group"><label>Shipping Charge (₹)</label><input type="number" name="shipping_charge" step="0.01" value="{{ settings.get('shipping_charge', '49') }}"></div>
            <div class="form-group"><label>Free Shipping Threshold (₹)</label><input type="number" name="free_shipping_threshold" step="0.01" value="{{ settings.get('free_shipping_threshold', '999') }}"><small class="form-help">Orders above this amount get free shipping</small></div>
            <div class="form-group"><label>Tax Rate (%)</label><input type="number" name="tax_rate" step="0.01" value="{{ settings.get('tax_rate', '0') }}"></div>
        </div>

        <div class="card">
            <div class="card-header"><h3>🏪 Store Info</h3></div>
            <div class="form-group"><label>Store Name</label><input type="text" name="store_name" value="{{ settings.get('store_name', '') }}"></div>
            <div class="form-group"><label>Phone</label><input type="text" name="store_phone" value="{{ settings.get('store_phone', '') }}"></div>
            <div class="form-group"><label>Email</label><input type="email" name="store_email" value="{{ settings.get('store_email', '') }}"></div>
            <div class="form-group"><label>Address</label><textarea name="store_address" rows="3">{{ settings.get('store_address', '') }}</textarea></div>
            <div class="form-group"><label>WhatsApp Number</label><input type="text" name="whatsapp_number" value="{{ settings.get('whatsapp_number', '') }}"><small class="form-help">Include country code, e.g. 919876543210</small></div>
        </div>
    </div>
    <div style="text-align:center;margin-top:24px"><button type="submit" class="btn btn-gold" style="padding:14px 48px;font-size:1rem">Save All Settings</button></div>
</form>
{% endblock %}
