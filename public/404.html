<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found – RamSetu Divine Stones</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Tiro+Devanagari+Sanskrit&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #1b263b 0%, #0d1b2a 100%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .error-container {
            text-align: center;
            padding: 20px;
        }
        .error-gold-accent {
            font-family: 'Cinzel', serif;
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #d4af37 0%, #f9e8a2 50%, #aa771c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin: 0;
            letter-spacing: 4px;
            filter: drop-shadow(0 4px 10px rgba(212, 175, 55, 0.2));
        }
        .error-title {
            font-family: 'Tiro Devanagari Sanskrit', serif;
            font-size: 2rem;
            margin: 20px 0 10px 0;
            color: #f9e8a2;
            letter-spacing: 1px;
        }
        .error-text {
            font-size: 1.1rem;
            color: #e0e1dd;
            max-width: 500px;
            line-height: 1.6;
            margin: 0 auto 35px auto;
        }
        .error-btn {
            display: inline-block;
            background: linear-gradient(135deg, #aa771c 0%, #d4af37 100%);
            color: #0d1b2a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 14px 35px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s ease;
        }
        .error-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
            background: linear-gradient(135deg, #d4af37 0%, #f9e8a2 100%);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-gold-accent">404</h1>
        <h2 class="error-title">मार्गः न प्राप्तः</h2>
        <p class="error-text">The page you are looking for does not exist on this sanctuary. Let us guide you back to the home of the divine stones.</p>
        <a href="/" class="error-btn">Return to Sanctuary</a>
    </div>
</body>
</html>
